services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5433:5432"
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ragnamok_network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        limits:
          memory: 8G
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ragnamok_network
    restart: unless-stopped

  backend:
    profiles: ["full"]
    image: ragnamok/backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - ./backend/data:/app/data
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=ragdb
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-change-me}
      - OLLAMA_BASE_URL=http://ollama:11434
      - SUMMARIZATION_MODEL=${SUMMARIZATION_MODEL:-qwen3.5:4b}
      - GENERATION_MODEL=${GENERATION_MODEL:-qwen3.5:4b}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-blaifa/multilingual-e5-large-instruct:Q8_0}
      - CORS_ORIGINS=http://localhost:8501,http://127.0.0.1:8501
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - ragnamok_network
    restart: unless-stopped

  frontend-local:
    profiles: ["full"]
    image: ragnamok/frontend:latest
    build:
      context: ./frontend-local
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8501:8501"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_started
    networks:
      - ragnamok_network
    restart: unless-stopped

volumes:
  pgvector_data:
  ollama_data:

networks:
  ragnamok_network:
    driver: bridge
